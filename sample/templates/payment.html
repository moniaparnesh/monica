{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 400px;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>₹ {{ d }}</h2>
    <p>Hello {{ user.name }}</p>

    <!-- Razorpay button -->
    <button id="pay-btn" style="background:#F37254; color:white;">
        Pay Now
    </button>

    <br><br>

    <!-- COD button -->
    <a href="{% url 'cod_success' %}">
    <button style="background: gray; padding:10px 20px;">
        Pay Later (COD)
    </button>
</a>


</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "rzp_test_SROSnyInFv81S4",
    "amount": "{{ amount }}",
    "currency": "INR",
    "order_id": "{{ order.id }}",

    "handler": function (response){
        window.location.href = "/success?payment_id=" + response.razorpay_payment_id;
    }
};

var rzp = new Razorpay(options);

document.getElementById("pay-btn").onclick = function(){
    rzp.open();
};
</script>

</body>
</html>
