<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 400px;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .user {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .amount {
            font-size: 24px;
            font-weight: bold;
            color: #F37254;
            margin-bottom: 20px;
        }

        .note {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
<form action="/success" method="POST">
    {% csrf_token %}

<div class="box">

    <div class="title">Secure Payment</div>

    <div class="user">
        Hello, {{ user.name }}
    </div>

    <div class="amount">
        ₹ {{ d|floatformat:2 }}
    </div>

    <div class="note">
        Click below to complete your payment safely with Razorpay
    </div></div>

 <script
    src="https://checkout.razorpay.com/v1/checkout.js"
    data-key="rzp_test_SROSnyInFv81S4"
    data-amount="{{ amount }}"
    data-currency="INR"
    data-order_id="{{ order.id }}"
    data-buttontext="Pay with Razorpay"
    data-name="django payment"
    data-description="this is test payment"
    data-image="https://example.com/your_logo.jpg"
    data-prefill.name="{{ user.name }}"
    data-prefill.email="{{ user.email }}"
    data-theme.color="#F37254">
</script>
<input type="hidden" custom="Hidden Element" name="hidden">
</form>
</div>

</body>
</html>
